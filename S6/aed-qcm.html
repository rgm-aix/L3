<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz AED — Garello</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');
:root{--burg:#7a1c2e;--burg-d:#4e1020;--burg-l:#a02840;--cream:#f5f0e8;--cream-d:#e8e0ce;--ink:#1a1008;--grey:#6b6057;--gold:#c9a84c;--green:#2d6a4f;--green-bg:#eaf5ee;--red:#b03020;--red-bg:#fdf0ee;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'EB Garamond',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}
#home{max-width:660px;margin:0 auto;padding:56px 24px 60px;}
.logo{font-size:2.4rem;font-weight:700;color:var(--burg-d);line-height:1.1;}
.sub{font-style:italic;color:var(--grey);font-size:1.05rem;margin:4px 0 36px;}
.set-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.set-card{display:flex;align-items:center;gap:14px;background:white;border:1.5px solid var(--cream-d);border-radius:8px;padding:13px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;user-select:none;}
.set-card:hover{border-color:var(--burg);box-shadow:0 2px 10px rgba(122,28,46,.1);}
.set-card.selected{border-color:var(--burg);background:#fff8f5;}
.set-card input{accent-color:var(--burg);width:17px;height:17px;pointer-events:none;}
.set-name{flex:1;font-size:.98rem;font-weight:500;}
.set-n{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--grey);}
.opt-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
.opt-label{display:flex;align-items:center;gap:7px;font-size:.92rem;color:var(--grey);cursor:pointer;}
.opt-label input{accent-color:var(--burg);}
.btn{display:inline-block;font-family:'EB Garamond',serif;border:none;border-radius:6px;cursor:pointer;transition:.15s;font-size:1.05rem;padding:11px 28px;}
.btn-primary{background:var(--burg);color:white;}.btn-primary:hover{background:var(--burg-l);}
.btn-outline{background:white;border:1.5px solid var(--burg);color:var(--burg);}.btn-outline:hover{background:var(--burg);color:white;}
.btn-ghost{background:none;border:1.5px solid var(--cream-d);color:var(--grey);}.btn-ghost:hover{border-color:var(--burg);color:var(--burg);}
.qhdr{background:var(--burg-d);color:white;display:flex;align-items:center;gap:16px;padding:13px 20px;position:sticky;top:0;z-index:50;}
.qhdr-label{font-style:italic;font-size:.9rem;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.prog-wrap{flex:1;background:rgba(255,255,255,.2);height:5px;border-radius:99px;overflow:hidden;}
.prog-bar{height:100%;background:var(--gold);border-radius:99px;transition:width .3s;}
.prog-txt{font-family:'DM Mono',monospace;font-size:.78rem;opacity:.8;white-space:nowrap;}
.btn-quit{background:none;border:1px solid rgba(255,255,255,.35);color:white;font-family:'EB Garamond',serif;font-size:.88rem;padding:4px 12px;border-radius:4px;cursor:pointer;}
.btn-quit:hover{background:rgba(255,255,255,.15);}
.qbody{max-width:700px;margin:0 auto;padding:36px 24px 80px;}
.q-set{font-family:'DM Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--grey);margin-bottom:8px;}
.q-txt{font-size:1.22rem;line-height:1.55;font-weight:600;margin-bottom:26px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:flex-start;gap:12px;background:white;border:1.5px solid var(--cream-d);border-radius:8px;padding:13px 16px;cursor:pointer;font-family:'EB Garamond',serif;font-size:1.03rem;line-height:1.45;text-align:left;color:var(--ink);transition:border-color .12s,background .12s;width:100%;}
.opt:hover:not(:disabled){border-color:var(--burg);background:#fff8f5;}
.opt:disabled{cursor:default;}
.opt-ltr{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;color:var(--grey);min-width:18px;padding-top:1px;}
.opt.correct{background:var(--green-bg);border-color:var(--green);}.opt.correct .opt-ltr{color:var(--green);}
.opt.wrong{background:var(--red-bg);border-color:var(--red);}.opt.wrong .opt-ltr{color:var(--red);}
.opt.show-correct{background:var(--green-bg);border-color:var(--green);opacity:.6;}
.fb{margin-top:18px;padding:13px 16px;border-radius:7px;font-size:.98rem;line-height:1.5;display:none;}
.fb.show{display:block;}.fb.ok{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green);}.fb.ko{background:var(--red-bg);border-left:3px solid var(--red);color:var(--red);}
.qnav{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;align-items:center;}
#results{max-width:660px;margin:0 auto;padding:52px 24px 80px;}
.res-h{font-size:1.9rem;font-weight:700;color:var(--burg-d);margin-bottom:4px;}
.res-score{font-family:'DM Mono',monospace;font-size:3.2rem;font-weight:500;color:var(--burg);margin:12px 0 2px;}
.res-pct{color:var(--grey);font-size:1rem;margin-bottom:28px;}
.res-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.missed-hd{font-size:1.15rem;font-weight:600;color:var(--burg-d);border-bottom:1px solid var(--cream-d);padding-bottom:8px;margin-bottom:14px;}
.missed-card{background:white;border:1.5px solid var(--cream-d);border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.missed-q{font-size:.98rem;font-weight:600;margin-bottom:7px;line-height:1.4;}
.missed-a{font-size:.93rem;line-height:1.6;}
.missed-a .lbl{color:var(--grey);}.missed-a .wrong{color:var(--red);}.missed-a .right{color:var(--green);font-weight:600;}
#missed-banner{display:none;background:#fff3cd;border:1.5px solid var(--gold);border-radius:7px;padding:10px 14px;margin-bottom:20px;font-size:.95rem;color:#7a5c00;}
</style>
</head>
<body>
<div id="home" class="screen active">
  <div>
    <h1 class="logo">Quiz AED</h1>
    <p class="sub">Pr. Garello — Aix-Marseille Université</p>
    <p id="missed-banner"></p>
    <div class="set-grid" id="set-grid"></div>
    <div class="opt-row">
      <label class="opt-label"><input type="checkbox" id="opt-shuffle" checked> Mélanger les questions</label>
      <label class="opt-label" id="lbl-missed" style="display:none"><input type="checkbox" id="opt-missed"> Travailler seulement les ratées</label>
    </div>
    <button class="btn btn-primary" id="btn-start">Commencer →</button>
  </div>
</div>
<div id="quiz" class="screen">
  <div class="qhdr">
    <span class="qhdr-label" id="qhdr-lbl"></span>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    <span class="prog-txt" id="prog-txt"></span>
    <button class="btn-quit" id="btn-quit">✕ Quitter</button>
  </div>
  <div class="qbody">
    <div class="q-set" id="q-set"></div>
    <div class="q-txt" id="q-txt"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <div class="qnav">
      <button class="btn btn-primary" id="btn-next" style="display:none">Question suivante →</button>
      <button class="btn btn-ghost" id="btn-flag" style="display:none">⚑ Marquer à revoir</button>
    </div>
  </div>
</div>
<div id="results" class="screen">
  <h2 class="res-h">Résultats</h2>
  <div class="res-score" id="res-score"></div>
  <div class="res-pct" id="res-pct"></div>
  <div class="res-actions" id="res-actions"></div>
  <div id="missed-list"></div>
</div>
<script>
var SETS = [{"id": "2021-2022-Marseille", "label": "2021-2022 — Marseille, Session 2", "questions": [{"q": "La tragédie des anti-commons s'observe lorsque :", "opts": ["A. il n'y a pas de droits de propriété", "B. il y a tellement de droits que l'on ne peut plus rien entreprendre sans violer le droit des autres (brevets, auteur, dessins et modèles, etc.)", "C. il y a trop de choses en commun", "D. il y a trop de gens qui s'opposent à la propriété"], "ans": 1}, {"q": "Laquelle des affirmations suivantes relève d'une analyse normative du droit ?", "opts": ["A. le droit des procédures collectives allemand protège mieux le créditeur que le droit des procédures collectives italien", "B. le passage à une responsabilité sans faute déresponsabilise les victimes potentielles", "C. mieux vaut, dans certaines circonstances, ouvrir la porte à une rupture de la relation contractuelle", "D. le salaire minimum risque de rendre l'accès au marché du travail plus difficile pour les individus peu qualifiés"], "ans": 2}, {"q": "Une règle X est préférable à une règle Y au sens de Pareto lorsque :", "opts": ["A. Une majorité de citoyens préfère X", "B. Les individus concernés ou bien préfèrent X à Y ou bien sont indifférents", "C. Le bilan social de X est supérieur", "D. la règle Y viole des droits"], "ans": 1}, {"q": "La valeur actualisée d'un paiement futur est en général :", "opts": ["A. égale à ce paiement", "B. supérieure à ce paiement", "C. inférieure à ce paiement", "D. sans rapport avec ce paiement"], "ans": 2}, {"q": "L'échange est :", "opts": ["A. créateur de valeur", "B. transfert de valeur", "C. neutre à l'égard de la valeur", "D. destructeur de valeur"], "ans": 0}, {"q": "La tragédie de la vaine pâture (the tragedy of the commons) illustre selon son auteur :", "opts": ["A. Les limites de la propriété", "B. l'asymétrie informationnelle", "C. La nécessité d'un Etat fort", "D. Le problème des biens en accès libre"], "ans": 3}, {"q": "Pour les « behavioristes » :", "opts": ["A. C'est le comportement des acteurs économiques qui est source de progrès", "B. Les individus ont une rationalité limitée car leurs pouvoirs de traitement de l'information sont limités et ils ont souvent des biais de perception", "C. Il faut inciter les acteurs économiques à choisir des comportements conformes à la morale", "D. Les acteurs économiques ne se fient qu'à leur instinct"], "ans": 1}, {"q": "La possibilité de protéger sa marque incite le producteur :", "opts": ["A. à se forger une bonne réputation (bon rapport qualité/prix)", "B. au gaspillage", "C. aux dépenses ostentatoires", "D. à baisser ses prix"], "ans": 0}, {"q": "L'AED aborde le droit avant tout sous l'angle de :", "opts": ["A. La morale", "B. La justice", "C. L'incitation", "D. La logique"], "ans": 2}, {"q": "Laisser un contrat incomplet est :", "opts": ["A. Toujours une bonne chose", "B. Parfois efficient", "C. Une erreur grave", "D. Forcément un oubli"], "ans": 1}, {"q": "Un bien en accès libre (les common pool resources étudiées par Ostrom) a les deux caractéristiques suivantes :", "opts": ["A. Excluabilité et non rivalité", "B. Non excluabilité et non rivalité", "C. Excluabilité et rivalité", "D. Non excluabilité et rivalité"], "ans": 3}, {"q": "Une politique qui atteint son but est :", "opts": ["A. Efficiente", "B. Efficace", "C. Effective", "D. Stupide"], "ans": 2}, {"q": "Les « patent trolls » sont :", "opts": ["A. Des entreprises qui fabriquent des jouets", "B. Des établissements qui détiennent un portefeuille de brevets sans produire", "C. Des producteurs qui se refusent à breveter leurs inventions", "D. Des fraudeurs au regard du droit des marques"], "ans": 1}, {"q": "Le choix d'un système économique selon Hayek doit prendre en compte prioritairement le problème :", "opts": ["A. de la rareté", "B. des connaissances", "C. de l'égoïsme", "D. des imprévus"], "ans": 1}, {"q": "Dans l'AED des contrats, une rupture de contrat est :", "opts": ["A. toujours efficiente", "B. toujours inefficiente", "C. parfois efficiente", "D. par définition efficiente"], "ans": 2}, {"q": "Dans un contrat d'assurance, la franchise permet de traiter les problèmes :", "opts": ["A. de sélection adverse", "B. de risque moral", "C. les deux", "D. ni l'un ni l'autre"], "ans": 2}, {"q": "Le débat sur les origines du droit (legal origins) est parti d'une étude qui affirmait que :", "opts": ["A. les pays de droit civil, et en particulier la France, sont moins efficients que d'autres systèmes juridiques, et en particulier que la common law", "B. l'apport du droit romain est plus fort dans la common law que dans le droit français", "C. c'est au législateur et non au juge de faire le droit", "D. le juge dit le droit mais ne fait pas le droit"], "ans": 0}, {"q": "Les limites placées à l'usage que le propriétaire pourra faire de son bien sont :", "opts": ["A. jamais efficientes d'un point de vue économique", "B. toujours efficientes", "C. parfois efficientes mais il faudra se méfier des conséquences de long terme qu'elles peuvent avoir", "D. contraires au droit français"], "ans": 2}, {"q": "Il y a plusieurs façons d'inciter les gens à respecter leurs promesses. Le droit sera particulièrement efficace lorsque ces promesses sont échangées :", "opts": ["A. entre des amis", "B. entre des étrangers", "C. entre des professionnels", "D. entre des gens qui ont souvent l'occasion de se rencontrer"], "ans": 1}, {"q": "Quel mécanisme d'internalisation des externalités requiert le moins d'information de la part de celui qui le met en œuvre :", "opts": ["A. La taxe", "B. La réglementation", "C. La règle de responsabilité", "D. La subvention"], "ans": 2}, {"q": "Quel intérêt y-a-t-il à proposer un menu (un choix) de contrats au lieu d'un seul contrat ?", "opts": ["A. Cela fait moins de travail", "B. Cela permet de sélectionner les clients", "C. Cela fait que les clients s'auto-sélectionnent", "D. Cela crée des emplois"], "ans": 2}, {"q": "Face à un problème d'externalité, quel est le meilleur argument en faveur d'une solution imposée par le haut (une loi ou une réglementation top-down) :", "opts": ["A. C'est mieux adapté au problème", "B. C'est plus rapide", "C. C'est plus souple", "D. Cela permet une meilleure utilisation des connaissances de terrain"], "ans": 1}, {"q": "Lorsque l'exécution d'un contrat devient problématique, le juge peut s'appuyer sur la doctrine du cheapest cost avoider. Ce dernier est :", "opts": ["A. celui des deux co-contractants qui était le mieux placé pour éviter ou pour s'assurer contre les difficultés que rencontre le contrat", "B. celui qui est le plus fortuné des deux parties", "C. celui qui n'a pas participé à la rédaction du contrat", "D. celui qui est dans son tort"], "ans": 0}, {"q": "L'innovation en matière de technique contractuelle vient le plus souvent :", "opts": ["A. des juges", "B. du législateur", "C. du gouvernement", "D. des acteurs économiques"], "ans": 3}, {"q": "Une analyse normative dit :", "opts": ["A. Ce qui est", "B. Ce qui sera", "C. Ce qui doit être", "D. Ce qui était"], "ans": 2}, {"q": "La durée optimale d'un brevet varie avec :", "opts": ["A. les coûts liés à la position de monopole", "B. les gains en termes d'incitation à la recherche", "C. les deux (coûts et gains)", "D. la pression exercée par les acteurs économiques"], "ans": 2}, {"q": "Les économistes de Chicago étaient réputés pour être plutôt :", "opts": ["A. en faveur d'une forte régulation de l'économie par l'État", "B. des disciples des classiques libéraux pro-marchés", "C. des socialistes", "D. des conservateurs"], "ans": 1}, {"q": "L'analyse économique procède le plus souvent par la construction de modèles. Un modèle est :", "opts": ["A. une description du monde idéal selon l'économiste", "B. une description la plus précise possible de la réalité", "C. une simplification de la réalité qui tente d'aller à l'essentiel", "D. un rappel de ce qui est forcément vrai"], "ans": 2}, {"q": "Peut-on tirer des conclusions normatives à partir d'une analyse positive ?", "opts": ["A. Oui, si l'analyse positive est bien conduite", "B. Oui lorsque les jugements de valeur importent peu", "C. Oui si les jugements de valeur sont objectifs", "D. Non, en aucun cas"], "ans": 3}, {"q": "Le nudging a pour but de pousser les individus à faire les choix qui sont bons pour eux…", "opts": ["A. sans toutefois les contraindre", "B. en faisant usage d'une coercition douce (la fiscalité par exemple)", "C. en faisant usage d'une coercition forte (obligation de porter le casque en vélo par exemple)", "D. en donnant des fausses informations"], "ans": 0}, {"q": "L'entrepreneur se démarque des autres acteurs du marché avant tout grâce à :", "opts": ["A. une meilleure perception de son environnement", "B. des capacités de calcul extraordinaires", "C. un goût prononcé pour l'aventure", "D. une grande aptitude au travail"], "ans": 0}, {"q": "Dans la « Richesse des Nations », Adam Smith consacre plusieurs pages à expliquer comment est produit un chandail. Il souhaite par-là souligner que :", "opts": ["A. la division du travail ne devrait pas s'étendre au-delà des frontières nationales", "B. la division du travail présente des dangers évidents", "C. ouverture des marchés, division du travail et spécialisation conduisent à des formes de coopération d'une extrême complexité", "D. le coton est un meilleur matériau que la laine"], "ans": 2}, {"q": "Pour l'économiste est « ressource » tout ce qui…", "opts": ["A. est périssable", "B. permet de satisfaire nos besoins", "C. nous est donné par la nature", "D. est disponible gratuitement"], "ans": 1}, {"q": "Le prix est :", "opts": ["A. la mesure de la valeur", "B. une information sur les valeurs que les individus accordent à un bien ou un service", "C. en général inférieur à la valeur", "D. toujours inférieur à la valeur"], "ans": 1}, {"q": "Un spéculateur professionnel est…", "opts": ["A. une malédiction pour les marchés", "B. un moyen sûr de réduire les fluctuations sur un marché", "C. quelqu'un qui ne crée aucune valeur pour l'économie", "D. un truand"], "ans": 1}, {"q": "Idéalement, le niveau de la taxe pigouvienne qui frappe une activité source d'externalités doit être :", "opts": ["A. de l'écart entre le coût social et le coût privé de cette activité", "B. égal au coût social de cette activité", "C. d'un montant suffisant pour que cesse l'externalité", "D. d'un montant inférieur au coût privé de cette activité"], "ans": 0}, {"q": "Qui décide de la rentabilité d'un brevet ?", "opts": ["A. L'Institut National de la Propriété Industrielle", "B. Celui qui le dépose", "C. L'État", "D. Les clients de l'entreprise qui dépose le brevet"], "ans": 3}, {"q": "Demsetz affirme qu'en présence d'externalités un système de droits de propriété a toutes les chances d'émerger lorsque :", "opts": ["A. le coût de l'externalité est faible", "B. le coût de la définition et de la mise en œuvre de ces droits est supérieur au gain associé à la suppression des externalités", "C. le coût de la définition et de la mise en œuvre de ces droits est inférieur au gain associé à la suppression des externalités", "D. les conflits deviennent importants"], "ans": 2}, {"q": "Le hasard moral est un problème lié :", "opts": ["A. à l'incertitude qui plane inévitablement sur l'action humaine", "B. au fait que l'une des parties au contrat n'est pas certaine que l'autre ne se comportera pas de façon opportuniste", "C. à la triche dans les jeux", "D. à l'incertitude sur la qualité d'un produit"], "ans": 1}, {"q": "La théorie de l'imprévision est plutôt en faveur :", "opts": ["A. du débiteur dans une relation contractuelle", "B. du créancier dans une relation contractuelle", "C. du juge qui doit trancher un conflit", "D. de l'État qui n'est pas censé tout savoir"], "ans": 0}]}, {"id": "2021-2022-Aix", "label": "2021-2022 — Aix, Session initiale", "questions": [{"q": "Lorsque Richard Esptein recommande l'adoption de règles simples dans un monde d'une complexité croissante il s'inscrit dans une approche…", "opts": ["A. qui recherche l'optimum en toutes circonstances", "B. qui prend en compte le problème de la connaissance et des limites de la régulation", "C. qui s'accorde bien avec notre monde actuel dans lequel les règles sont peu nombreuses", "D. qui est suivie par la plupart des législations"], "ans": 1}, {"q": "Les données recueillies par l'Institut qui calcule le International property rights index montrent que :", "opts": ["A. la qualité de leurs régimes de propriété est la cause première de l'enrichissement des nations", "B. la richesse des nations permet d'avoir un régime de propriété avancé", "C. Il est possible de s'enrichir tout en ayant un régime de propriété médiocre", "D. les nations qui sont riches ont toutes un régime de propriété de qualité"], "ans": 3}, {"q": "Le juge Breyer voit dans le brevet :", "opts": ["A. un droit qui n'apporte que des avantages à la société", "B. une arme à double tranchant", "C. un droit qui n'apporte que des inconvénients", "D. un vestige du passé"], "ans": 1}, {"q": "Selon Calabresi et Melamed, nos droits peuvent être protégés par des property rules (injonction) ou des liability rules (dommages versés). Quelle protection préférer ?", "opts": ["A. toujours les property rules", "B. toujours les liability rules", "C. plutôt les property rules sauf si les parties impliquées dans le conflit ne peuvent négocier", "D. plutôt les liability rules sauf s'il est facile d'évaluer les dommages"], "ans": 2}, {"q": "D'après l'analyse économique du droit, le transfert forcé de propriété (expropriation) est :", "opts": ["A. difficile à justifier sur un plan purement économique, sauf cas très particuliers", "B. une évidence car il conduit à un meilleur usage des biens", "C. un bon moyen de gagner du temps", "D. une pratique à laquelle on devrait avoir plus souvent recours"], "ans": 0}, {"q": "Les dernières grandes crises économiques que nous avons connues (2008-2010) s'expliquent par :", "opts": ["A. une faiblesse inhérente du capitalisme et de la propriété privée en particulier", "B. une trop grande confiance dans les mécanismes de marché", "C. le fait que dans le secteur de la finance (publique et privée) l'usus et le fructus sont souvent déconnectés", "D. une trop grande spéculation sur les marchés boursiers"], "ans": 2}, {"q": "Face à des comportements jugés inappropriés tel que la consommation de stupéfiants, lequel de ces « mécanismes » est le moins coercitif ?", "opts": ["A. L'interdiction (pénalisation)", "B. La taxe", "C. Le nudge", "D. La consommation sous contrôle"], "ans": 2}, {"q": "Chez les économistes, à qui doit-on une présentation très claire de ce qui est connu sous le nom de « problème de la connaissance » ?", "opts": ["A. Lord Robbins", "B. John Maynard Keynes", "C. Joseph Schumpeter", "D. Friedrich Hayek"], "ans": 3}, {"q": "Quel lien existe-t-il entre la valeur et le prix ?", "opts": ["A. il n'y a aucun lien", "B. ce sont deux mots pour désigner la même chose", "C. la valeur est toujours supérieure au prix", "D. le prix nous informe sur la valeur que les individus donnent à quelque chose"], "ans": 3}, {"q": "Le « commerce d'accaparement » dont parle Jean-Baptiste Say dans sa discussion sur la spéculation est :", "opts": ["A. un cas très particulier de spéculation que l'on a plus de chance de trouver aujourd'hui qu'au temps de Say", "B. un cas très particulier de spéculation que l'on a moins de chance de trouver aujourd'hui qu'au temps de Say", "C. la preuve que toute spéculation est déstabilisante", "D. la preuve que toute spéculation accroît la volatilité des prix"], "ans": 0}, {"q": "Le problème des anti-commons vient :", "opts": ["A. d'une absence de droits de propriété", "B. d'un envahissement par les droits de la propriété intellectuelle", "C. de la propriété collective", "D. de l'opposition à la propriété collective"], "ans": 1}, {"q": "En rachetant Motorola, Google a acquis combien de brevets ?", "opts": ["A. 53", "B. 0", "C. 234", "D. environ 24 500"], "ans": 3}, {"q": "Le droit des marques…", "opts": ["A. est un outil très efficace pour transmettre de l'information au consommateur", "B. décourage les investisseurs", "C. crée inutilement de la rareté", "D. est un outil anti-économique"], "ans": 0}, {"q": "Les patent trolls sont :", "opts": ["A. des opérateurs de marché qui investissent dans la production", "B. des entités qui rachètent des brevets dans le seul but de faire du chantage aux producteurs qui violent un de leurs brevets", "C. des entreprises qui offrent leurs services pour le dépôt de brevets", "D. des opérations illégales sur le marché des brevets"], "ans": 1}, {"q": "Les expériences conduites sur le jeu de l'ultimatum révèlent…", "opts": ["A. que celui qui se trouve dans la position de faire une offre à prendre ou à laisser rafle tous les gains de l'échange", "B. que les parties à une négociation ne se font pas de cadeau", "C. que les parties à une négociation ne se comportent pas nécessairement selon les canons d'une rationalité simpliste", "D. qu'il est facile de prévoir l'issue des négociations"], "ans": 2}, {"q": "En organisant des enchères, le vendeur…", "opts": ["A. cherche à donner à chacun sa chance", "B. veut être certain de vendre le bien", "C. veut inciter les acheteurs à révéler la valeur qu'ils donnent au bien mis aux enchères", "D. cherche à économiser sur les coûts de transaction"], "ans": 2}, {"q": "Le dilemme assurance-incitation dans un contrat de travail est :", "opts": ["A. que l'on ne peut pas assurer la production tout en donnant de mauvaises incitations au salarié", "B. que l'on ne peut à la fois avoir un contrat par lequel l'employeur couvre les risques à la place de l'employé et un contrat qui incite l'employé à l'effort", "C. que l'assureur n'a pas les bonnes incitations", "D. qu'un employeur bien assuré ne fait plus d'effort"], "ans": 1}, {"q": "La sélection adverse est :", "opts": ["A. ce qui risque de se passer lorsque je n'ai pas une bonne information sur le co-contractant", "B. ce qui advient à un assureur qui ne peut observer les efforts de ses assurés", "C. une opportunité pour les co-contractants d'accroître leurs gains", "D. choisir le mauvais usage pour ce que l'on possède"], "ans": 0}, {"q": "Pour informer sur la qualité d'un produit ou d'une personne on envoie des signaux. Pour être efficace ces signaux doivent…", "opts": ["A. ne rien coûter à celui qui les envoie", "B. ne pas trop coûter à celui qui les envoie", "C. avoir un coût pour celui qui les envoie et que ce coût varie en fonction de la qualité du produit ou de la personne", "D. pouvoir être envoyés sans problème par n'importe qui"], "ans": 2}, {"q": "Les stocks options :", "opts": ["A. sont des réserves en capital que l'on utilise seulement si l'on veut", "B. donnent la possibilité à leur détenteur d'acheter les actions d'une société à une date donnée et pour un prix donné", "C. sont des stocks de produit que l'on constitue pour faire face à des commandes imprévues", "D. des obligations d'achat dans une période donnée"], "ans": 1}, {"q": "On laissera volontairement le contrat incomplet si…", "opts": ["A. le gain espéré en précisant le contrat est inférieur au coût que génère le fait de compléter le contrat", "B. on est rigoureux", "C. le gain espéré en précisant le contrat est supérieur au coût que génère le fait de compléter le contrat", "D. on manque d'imagination"], "ans": 0}, {"q": "Dans son article « La nature de la firme », Ronald Coase explique le recours à ce mode hiérarchique de coopération qu'est la firme par l'existence…", "opts": ["A. d'entrepreneurs qui n'aiment pas le marché", "B. de coûts de transaction sur les marchés", "C. d'individus qui aiment avoir tous les pouvoirs", "D. d'individus irrationnels"], "ans": 1}, {"q": "Le concept de « rupture efficiente du contrat » repose sur l'idée…", "opts": ["A. que les promesses n'engagent que ceux qui y croient", "B. qu'on ne saurait obliger l'individu à faire ce qu'il n'a pas envie de faire", "C. qu'une rupture de contrat, en respectant certaines conditions, est parfois dans l'intérêt de tous", "D. qu'il y a des cas de force majeure"], "ans": 2}, {"q": "Dans la common law, la doctrine des « expected damages » conduit le débiteur qui n'exécute pas sa promesse à verser à la victime des dommages et intérêts qui sont du niveau…", "opts": ["A. des gains espérés", "B. des gains espérés et des pertes encourues", "C. des pertes subies", "D. nécessaire pour ne plus qu'il recommence"], "ans": 1}, {"q": "En cas de non-exécution ou d'exécution imparfaite du contrat, l'analyse économique nous enseigne que les dommages versés à la victime doivent intégrer :", "opts": ["A. uniquement les coûts directement liés à la non-exécution sans tenir compte des investissements réalisés par le promis", "B. tous les coûts directs et indirects que le promis subit du fait de la non-exécution", "C. les coûts engendrés par la non-exécution seulement si ces coûts étaient prévisibles pour le promettant", "D. une sanction pour avoir failli à sa promesse qui va au-delà des coûts supportés par le promis"], "ans": 1}, {"q": "Quel philosophe célèbre a opposé le is et le ought et souligné l'impossibilité de passer, par la simple logique, du premier au second ?", "opts": ["A. Adam Smith", "B. David Ricardo", "C. René Descartes", "D. David Hume"], "ans": 3}, {"q": "Si l'on compare les solutions proposées par l'analyse économique du droit et les solutions que l'on trouve effectivement à travers le droit, celles-ci sont :", "opts": ["A. le plus souvent incompatibles", "B. le plus souvent compatibles", "C. toujours incompatibles", "D. incomparables"], "ans": 1}, {"q": "Posner note que les économistes ont traditionnellement souligné dans le régime de propriété :", "opts": ["A. sa souplesse", "B. sa subjectivité", "C. ses vertus dynamiques", "D. ses vertus statiques"], "ans": 3}, {"q": "Laquelle des affirmations suivantes relève d'une analyse normative du droit ?", "opts": ["A. mieux vaut, dans certaines circonstances, ouvrir la porte à une rupture de la relation contractuelle", "B. le passage à une responsabilité sans faute déresponsabilise les victimes potentielles", "C. le salaire minimum risque de rendre l'accès au marché du travail plus difficile pour les individus peu qualifiés", "D. le droit des procédures collectives allemand protège mieux le créditeur que le droit des procédures collectives italiens"], "ans": 0}, {"q": "Dans un contrat de travail, la période d'essai permet de traiter…", "opts": ["A. uniquement le problème du hasard moral", "B. uniquement le problème de la sélection adverse", "C. ni les problèmes de sélection adverse ni les problèmes de hasard moral", "D. à la fois le problème de sélection adverse mais aussi celui du hasard moral"], "ans": 3}, {"q": "Quelle affirmation retrace le mieux le calcul de l'économiste : la durée de la protection accordée par un brevet devrait dépendre…", "opts": ["A. du temps qu'a nécessité la recherche qui conduit au brevet", "B. du besoin que permet de satisfaire cette innovation", "C. du coût que ce monopole impose à la société (monopole accordé à l'innovateur) mais aussi des bénéfices en termes d'une plus grande incitation à rechercher de nouvelles idées", "D. des sommes investies dans la recherche"], "ans": 2}, {"q": "Hernando de Soto parle de « capital mort » pour désigner :", "opts": ["A. un capital qui sert essentiellement à financer les conflits", "B. un capital qui ne peut être utilisé comme collatéral car il n'existe pas d'enregistrement des droits de propriété sur le capital", "C. un capital qui a disparu avec ses propriétaires", "D. un capital qui a quitté son pays"], "ans": 1}, {"q": "Bastiat nous invite à considérer les effets immédiats mais aussi secondaires d'une politique car :", "opts": ["A. les seconds sont plus importants", "B. les deux se renforcent", "C. les deux vont souvent dans des directions opposées", "D. c'est une exigence de la démocratie"], "ans": 2}, {"q": "Un individu est rationnel au sens de l'analyse économique si :", "opts": ["A. il sait faire taire ses sentiments", "B. il agit du mieux qu'il peut pour atteindre ses fins", "C. il est parfaitement informé", "D. il ne fait jamais d'erreur"], "ans": 1}, {"q": "D'après Pigou, un problème de pollution peut parfois être traité par l'imposition d'une taxe. Le but de la taxe est alors :", "opts": ["A. de réduire la pollution", "B. de faire disparaître la pollution", "C. de faire prendre en compte par le pollueur le coût que cette pollution impose à la société", "D. de sanctionner le pollueur"], "ans": 2}, {"q": "En augmentant les droits de succession on incite les propriétaires à…", "opts": ["A. prêter plus d'attention aux investissements de long terme", "B. se détourner des investissements de long terme", "C. tricher", "D. épargner plutôt que de consommer"], "ans": 1}, {"q": "Le coût d'opportunité associé à un choix est la valeur…", "opts": ["A. de ce choix", "B. des coûts de production", "C. de ce à quoi je renonce en faisant ce choix", "D. de ce que j'obtiens par ce choix"], "ans": 2}, {"q": "L'AED aborde le droit avant tout sous l'angle de :", "opts": ["A. la morale", "B. la logique", "C. l'incitation", "D. la justice"], "ans": 2}, {"q": "Qui est le mieux placé pour trouver des parades au problème du hasard moral ?", "opts": ["A. l'économiste", "B. le législateur", "C. les parties elles-mêmes", "D. le juge"], "ans": 2}, {"q": "Dans l'esprit de Kaldor-Hicks, le passage d'une règle A à une règle B est efficient si et seulement si :", "opts": ["A. tout le monde préfère la règle B", "B. ceux qui gagnent dans le passage de A à B compensent ceux qui perdent", "C. ceux qui gagnent dans le passage de A à B sont en mesure de compenser ceux qui perdent", "D. une majorité préfère la règle B à la règle A"], "ans": 2}]}, {"id": "2022-2023", "label": "2022-2023 — Aix (Sujet 1)", "questions": [{"q": "Lorsque Richard Esptein recommande l'adoption de règles simples dans un monde d'une complexité croissante il s'inscrit dans une approche…", "opts": ["A. qui recherche l'optimum en toutes circonstances", "B. qui prend en compte le problème de la connaissance et des limites de la régulation", "C. qui s'accorde bien avec notre monde actuel dans lequel les règles sont peu nombreuses", "D. qui est suivie par la plupart des législations"], "ans": 1}, {"q": "Une loi organique de 2009 (No 2009-403, article 8) est en lien avec l'AED car elle préconise :", "opts": ["A. que les coûts de la justice soient réduits de moitié", "B. que l'analyse économique du droit soit enseignée dans toutes les universités", "C. que les projets de loi fassent l'objet d'une étude d'impact", "D. une réforme du droit pénal"], "ans": 2}, {"q": "Pour compléter de façon efficace un contrat lorsqu'un risque non prévu dans le contrat se manifeste, il faut rechercher :", "opts": ["A. laquelle des parties était mieux placée pour réduire ou s'assurer contre ce risque", "B. qui est le plus affecté par ce risque", "C. qui est le plus riche", "D. qui est le plus expérimenté des deux"], "ans": 0}, {"q": "L'analyse économique procède le plus souvent par la construction de modèles. Un modèle est :", "opts": ["A. Ce que serait le monde idéal selon l'économiste", "B. Une description la plus précise possible de la réalité", "C. Une simplification de la réalité qui tente d'aller à l'essentiel", "D. Un rappel de ce qui est vrai"], "ans": 2}, {"q": "D'après l'analyse économique du droit, le transfert forcé de propriété (expropriation) est :", "opts": ["A. difficile à justifier sur un plan purement économique, sauf dans des cas très particuliers", "B. une évidence car il conduit à un meilleur usage des biens", "C. un bon moyen de gagner du temps", "D. une pratique à laquelle on devrait avoir plus souvent recours"], "ans": 0}, {"q": "Le nudging a pour but de pousser les individus à faire les choix qui sont bons pour eux…", "opts": ["A. Sans toutefois les contraindre", "B. En faisant usage d'une coercition douce (la fiscalité par exemple)", "C. En faisant usage d'une coercition forte (obligation de s'assurer par exemple)", "D. En communiquant de fausses informations"], "ans": 0}, {"q": "Pour l'économiste, est « ressource » tout ce qui :", "opts": ["A. Est périssable", "B. Permet de satisfaire un besoin", "C. Nous est donné par la nature", "D. Est disponible gratuitement"], "ans": 1}, {"q": "Un spéculateur professionnel est :", "opts": ["A. Une malédiction pour les marchés", "B. Un moyen sûr de réduire les fluctuations sur un marché", "C. Quelqu'un qui ne crée aucune valeur pour l'économie", "D. Un truand"], "ans": 1}, {"q": "Quel lien existe-t-il entre la valeur et le prix ?", "opts": ["A. Il n'y a aucun lien", "B. Ce sont deux mots pour désigner la même chose", "C. La valeur est toujours supérieure au prix", "D. Le prix nous informe sur la valeur que les individus donnent à quelque chose"], "ans": 3}, {"q": "Pour trouver une solution qui internalise les externalités on peut s'en remettre à une approche bottom-up ou top-down. Dans quel domaine l'approche top-down a-t-elle souvent un avantage ?", "opts": ["A. La rapidité de la mise en place d'une solution", "B. La qualité de la solution", "C. L'utilisation des connaissances locales par la solution", "D. La flexibilité de la solution"], "ans": 0}, {"q": "Une personne à laquelle on offre, pour la somme de 5 euros, un billet de loterie qui rapporte 10 euros avec une chance sur deux et rien avec une chance sur deux et qui refuse l'offre est :", "opts": ["A. Incohérente", "B. averse au risque", "C. amoureuse du risque", "D. neutre à l'égard du risque"], "ans": 1}, {"q": "Demsetz affirme qu'en présence d'externalités un système de droits de propriété a toutes les chances d'émerger lorsque :", "opts": ["A. le coût de l'externalité est faible", "B. le coût de la définition et de la mise en œuvre de ces droits est supérieur au gain associé à la suppression des externalités", "C. le coût de la définition et de la mise en œuvre de ces droits est inférieur au gain associé à la suppres st toujours supérieure au prix", "D. Le prix nous informe sur la valeur que les individus donnent à la chose"], "ans": 3}, {"q": "Quel métier exerçait Adam Smith ?", "opts": ["A. Économiste d'entreprise", "B. Professeur de philosophie morale", "C. Conseiller du Roi d'Ecosse", "D. Diplomate et philosophe"], "ans": 1}, {"q": "Les patent trolls sont :", "opts": ["A. Des opérateurs de marché qui investissent dans la production", "B. Des entités qui rachètent des brevets dans le seul but de faire du chantage aux producteurs qui viendraient à violer un de leurs brevets", "C. Des entreprises qui offrent leurs services pour le dépôt de brevets", "D. Des opérations illégales sur le marché des brevets"], "ans": 1}, {"q": "Les études empiriques du lien entre qualité du régime de protection de la propriété et niveau de développement économique d'un pays ont permis de mettre en évidence :", "opts": ["A. Une corrélation négative entre ces deux paramètres", "B. Une causalité : un bon régime de propriété est la cause d'un bon développement", "C. Une causalité : un bon développement économique permet la mise en place d'un bon régime de propriété", "D. Une corrélation positive (qualité de la protection et développement vont ensemble)"], "ans": 3}, {"q": "Pour informer sur la qualité d'un produit ou d'une personne on envoie des signaux. Pour être efficace ces signaux doivent…", "opts": ["A. Ne rien coûter à celui qui les envoie", "B. Ne pas trop coûter à celui qui les envoie", "C. Avoir un coût pour celui qui les envoie et que ce coût varie en fonction de la qualité du produit ou de la personne", "D. Pouvoir être envoyés sans problème par n'importe qui"], "ans": 2}, {"q": "Le paradoxe d'Ellsberg nous apprend que lorsque nous devons choisir entre deux options nous avons tendance à aller vers celle :", "opts": ["A. Qui rapporte le plus", "B. Sur laquelle nous avons le plus d'informations", "C. Qui est la moins risquée", "D. Qui est la plus risquée"], "ans": 1}, {"q": "Le concept de rupt   var pool=[];
  sel.forEach(function(sid){
    var s=SETS.find(function(x){return x.id===sid;});
    s.questions.forEach(function(q,qi){
      var uid=sid+'__'+qi;
      if(!missedOnly||G.missed[uid]){
        pool.push({q:q.q,opts:q.opts,ans:q.ans,uid:uid,setLabel:s.label});
      }
    });
  });
  if(!pool.length){alert('Aucune question ratée pour ces QCM.');return;}
  if(shuffle)pool.sort(function(){return Math.random()-.5;});
  G.queue=pool;G.cur=0;G.session=[];G.flagged={};
  showScreen('quiz');renderQ();
});

function renderQ(){
  var total=G.queue.length;
  if(G.cur>=total){showResults();return;}
  var q=G.queue[G.cur];
  G.answered=false;
  var pct=(G.cur/total)*100;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=(G.cur+1)+' / '+total;
  document.getElementById('qhdr-lbl').textContent=q.setLabel;
  document.getElementById('q-set').textContent=q.setLabel;
  document.getElementById('q-txt').textContent=q.q;
  var ol=document.getElementById('opts');
  ol.innerHTML='';
  q.opts.forEach(function(opt,i){
    var btn=document.createElement('button');
    btn.className='opt';
    var ltr=['A','B','C','D'][i];
    btn.innerHTML='<span class="opt-ltr">'+ltr+'.</span><span>'+opt.replace(/^[A-D]\.\s*/,'')+'</span>';
    btn.addEventListener('click',function(){doAnswer(i);});
    ol.appendChild(btn);
  });
  var fb=document.getElementById('fb');
  fb.className='fb';fb.textContent='';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-flag').style.display='none';
  updateFlag(q.uid);
}

function doAnswer(chosen){
  if(G.answered)return;
  G.answered=true;
  var q=G.queue[G.cur];
  var ok=chosen===q.ans;
  if(ok)delete G.missed[q.uid];
  else G.missed[q.uid]=true;
  G.session.push({uid:q.uid,q:q,chosen:chosen,correct:ok});
  document.querySelectorAll('.opt').forEach(function(btn,i){
    btn.disabled=true;
    if(i===q.ans){btn.classList.add(i===chosen?'correct':'show-correct');}
    else if(i===chosen){btn.classList.add('wrong');}
  });
  var fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'ok':'ko');
  fb.textContent=ok?'✓ Bonne réponse !':'✗ Mauvaise réponse. La bonne réponse était : '+q.opts[q.ans];
  document.getElementById('btn-next').style.display='';
  document.getElementById('btn-flag').style.display='';
}

document.getElementById('btn-next').addEventListener('click',function(){G.cur++;renderQ();});
document.getElementById('btn-quit').addEventListener('click',showResults);

document.getElementById('btn-flag').addEventListener('click',function(){
  var q=G.queue[G.cur];
  if(G.flagged[q.uid])delete G.flagged[q.uid];else G.flagged[q.uid]=true;
  updateFlag(q.uid);
});

function updateFlag(uid){
  var btn=document.getElementById('btn-flag');
  var on=!!G.flagged[uid];
  btn.textContent=on?'⚑ Marquée à revoir':'⚑ Marquer à revoir';
  btn.style.background=on?'#fff3cd':'';
  btn.style.borderColor=on?'var(--gold)':'';
  btn.style.color=on?'#7a5c00':'';
}

function showResults(){
  showScreen('results');
  var total=G.session.length;
  var good=G.session.filter(function(r){return r.correct;}).length;
  var pct=total?Math.round(good/total*100):0;
  document.getElementById('res-score').textContent=good+' / '+total;
  document.getElementById('res-pct').textContent=pct+'% de bonnes réponses';
  var wrong=G.session.filter(function(r){return !r.correct;});
  var flaggedArr=G.session.filter(function(r){return G.flagged[r.uid];});
  var actions=document.getElementById('res-actions');
  actions.innerHTML='';
  if(wrong.length){
    var b1=document.createElement('button');
    b1.className='btn btn-primary';
    b1.textContent='Refaire les '+wrong.length+' ratée(s)';
    b1.addEventListener('click',function(){
      document.getElementById('opt-missed').checked=true;
      initHome();showScreen('home');
    });
    actions.appendChild(b1);
  }
  if(flaggedArr.length){
    var b2=document.createElement('button');
    b2.className='btn btn-outline';
    b2.textContent='Refaire les '+flaggedArr.length+' marquée(s)';
    b2.addEventListener('click',function(){
      Object.keys(G.missed).forEach(function(k){delete G.missed[k];});
      flaggedArr.forEach(function(r){G.missed[r.uid]=true;});
      document.getElementById('opt-missed').checked=true;
      initHome();showScreen('home');
    });
    actions.appendChild(b2);
  }
  var b3=document.createElement('button');
  b3.className='btn btn-ghost';
  b3.textContent='← Accueil';
  b3.addEventListener('click',function(){initHome();showScreen('home');});
  actions.appendChild(b3);
  var ml=document.getElementById('missed-list');
  ml.innerHTML='';
  if(!wrong.length){ml.innerHTML='<p style="color:var(--green);font-size:1.1rem;margin-top:8px;">🎉 Parfait — aucune erreur !</p>';return;}
  ml.innerHTML='<div class="missed-hd">Questions ratées ('+wrong.length+')</div>';
  wrong.forEach(function(r){
    var div=document.createElement('div');
    div.className='missed-card';
    div.innerHTML='<div class="missed-q">'+r.q.q+'</div>'
      +'<div class="missed-a"><span class="lbl">Ta réponse : </span><span class="wrong">'+r.q.opts[r.chosen]+'</span><br>'
      +'<span class="lbl">Bonne réponse : </span><span class="right">'+r.q.opts[r.q.ans]+'</span></div>';
    ml.appendChild(div);
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

initHome();
</script>
</body>
</html>
